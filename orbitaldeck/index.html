<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'">
  <title>OrbitalDeck</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #050505;
      color: #f7f7f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { width: min(100%, 560px); }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    p { color: #b9c2c5; line-height: 1.55; }
    nav { display: grid; gap: 12px; margin-top: 28px; }
    a { color: #ff5b2e; text-underline-offset: 4px; }
  </style>
</head>
<body>
  <main>
    <h1>OrbitalDeck</h1>
    <p>Audio-to-BPM and MIDI Clock companion for supported performance devices.</p>
    <nav aria-label="OrbitalDeck information">
      <a href="/orbitaldeck/privacy/">Privacy Policy</a>
      <a href="https://github.com/subversive01/DeFUNKdOrbitalDeck/issues" rel="noopener noreferrer" referrerpolicy="no-referrer">Support</a>
    </nav>
  </main>
</body>
</html>
