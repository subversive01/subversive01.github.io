<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self'; style-src 'unsafe-inline'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'">
  <title>SBHC Security</title>
  <style>
    :root {
      color-scheme: dark;
      --black: #050505;
      --white: #f4f2ee;
      --muted: #a7adae;
      --signal: #ff5b45;
      --line: #2e3334;
    }
    * { box-sizing: border-box; }
    html { background: var(--black); }
    body {
      margin: 0;
      background: var(--black);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    a { color: inherit; text-underline-offset: 5px; }
    .hero {
      position: relative;
      width: min(100%, 80svh);
      min-height: 100svh;
      height: 100svh;
      margin: 0 auto;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
    }
    .art-frame {
      position: absolute;
      top: 0;
      left: 50%;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
      transform: translateX(-50%);
    }
    .hero-art {
      position: absolute;
      inset: 0;
      z-index: -2;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }
    .site-header {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 26px 30px;
      font-size: 0.76rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .site-header a { text-decoration: none; }
    .site-header a:hover,
    .site-header a:focus-visible { color: var(--signal); }
    .signal-mark { color: var(--signal); }
    .hero-copy {
      position: absolute;
      bottom: 62px;
      left: 0;
      width: 100%;
      padding: 0 30px;
    }
    .eyebrow {
      margin: 0 0 14px;
      color: var(--signal);
      font-size: 0.75rem;
      font-weight: 750;
      text-transform: uppercase;
    }
    h1 {
      max-width: 720px;
      margin: 0;
      font-size: 5rem;
      font-weight: 780;
      line-height: 0.98;
      letter-spacing: 0;
      text-shadow: 0 2px 18px #000;
    }
    .intro {
      max-width: 490px;
      margin: 22px 0 0;
      color: #d4d5d2;
      font-size: 1.05rem;
      line-height: 1.55;
      text-shadow: 0 2px 12px #000;
    }
    footer {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      width: min(100%, 1180px);
      margin: 0 auto;
      padding: 22px 30px 30px;
      border-top: 1px solid var(--line);
      color: #717878;
      font-size: 0.72rem;
      text-transform: uppercase;
    }
    @media (max-width: 720px) {
      .hero {
        min-height: 0;
        height: auto;
        aspect-ratio: 4 / 5;
      }
      .art-frame {
        width: 100%;
      }
      .site-header { padding: 22px 20px; }
      .hero-copy {
        bottom: 38px;
        padding: 0 20px;
      }
      h1 { font-size: 3.15rem; }
      .intro {
        max-width: 330px;
        margin-top: 16px;
        font-size: 0.96rem;
      }
      footer {
        align-items: flex-start;
        padding: 20px;
      }
    }
    @media (max-width: 360px) {
      .eyebrow { font-size: 0.68rem; }
      h1 { font-size: 2.65rem; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="site-title">
      <div class="art-frame">
        <img class="hero-art" src="/assets/sbhc-security-cover.png" width="960" height="1200" alt="A figure standing above a monochrome city divided by a vertical red signal">
      </div>
      <header class="site-header">
        <a href="/" aria-label="SBHC Security home">SBHC<span class="signal-mark">SECURITY</span></a>
        <a href="/orbitaldeck/">Current Projects</a>
      </header>
      <div class="hero-copy">
        <p class="eyebrow">Independent signal / Los Angeles</p>
        <h1 id="site-title">SBHC Security</h1>
        <p class="intro">Independent software, and security projects built at the edge of sound, hardware, and art.</p>
      </div>
    </section>
  </main>

  <footer>
    <span>SBHC Security</span>
    <span>Static / no tracking</span>
  </footer>
</body>
</html>
