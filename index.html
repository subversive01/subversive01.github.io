<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self'; style-src 'unsafe-inline'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'">
  <title>SBHC Security</title>
  <style>
    :root {
      color-scheme: dark;
      --black: #050505;
      --white: #f4f2ee;
      --muted: #a7adae;
      --signal: #ff5b45;
      --line: #2e3334;
      --cover-gutter-total: clamp(48px, 22.5vw, 288px);
    }
    * { box-sizing: border-box; }
    html { background: var(--black); }
    body {
      margin: 0;
      overflow-x: hidden;
      background: var(--black);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    a { color: inherit; text-underline-offset: 5px; }
    .hero {
      position: relative;
      container-type: inline-size;
      width: calc(100vw - var(--cover-gutter-total));
      min-height: 0;
      height: auto;
      aspect-ratio: 8 / 5;
      margin: 0 auto;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
    }
    .art-frame {
      position: absolute;
      top: 0;
      left: 50%;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
      transform: translateX(-50%);
    }
    .hero-art {
      position: absolute;
      top: 0;
      left: 0;
      z-index: -2;
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: top center;
    }
    .site-header {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: clamp(20px, 2.17cqw, 42px) clamp(20px, 3.125cqw, 60px);
      font-size: clamp(0.68rem, 1.25cqw, 1.5rem);
      font-weight: 700;
      text-transform: uppercase;
    }
    .site-header a { text-decoration: none; }
    .site-header a:hover,
    .site-header a:focus-visible { color: var(--signal); }
    .signal-mark { color: var(--signal); }
    .hero-copy {
      position: absolute;
      bottom: clamp(90px, 8.5cqw, 136px);
      left: 0;
      width: 100%;
      padding: 0 clamp(20px, 3.125cqw, 60px);
    }
    .eyebrow {
      margin: 0 0 clamp(12px, 1.46cqw, 28px);
      color: var(--signal);
      font-size: clamp(0.68rem, 1.25cqw, 1.5rem);
      font-weight: 750;
      text-transform: uppercase;
    }
    h1 {
      max-width: 75cqw;
      margin: 0;
      font-size: clamp(2.5rem, 8.33cqw, 10rem);
      font-weight: 780;
      line-height: 0.98;
      letter-spacing: 0;
      text-shadow: 0 2px 18px #000;
    }
    .intro {
      max-width: 51cqw;
      margin: clamp(16px, 2.29cqw, 44px) 0 0;
      color: #d4d5d2;
      font-size: clamp(0.88rem, 1.75cqw, 2rem);
      line-height: 1.55;
      text-shadow: 0 2px 12px #000;
    }
    .cover-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      width: 100%;
      padding: clamp(20px, 2.29vw, 44px) clamp(20px, 3.125vw, 60px);
      color: #717878;
      font-size: clamp(0.68rem, 1.2vw, 1.35rem);
      text-transform: uppercase;
      background: linear-gradient(to top, rgba(5, 5, 5, 0.72), transparent);
    }
    @media (max-width: 720px) {
      .hero {
        width: calc(100vw - 12px);
        min-height: 100svh;
        height: 100svh;
        aspect-ratio: auto;
      }
      .hero-art {
        height: 100%;
        object-fit: cover;
        object-position: center;
      }
      .intro {
        max-width: 72cqw;
      }
      .hero-copy {
        bottom: 88px;
      }
      .cover-footer {
        align-items: flex-start;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="site-title">
      <div class="art-frame">
        <img class="hero-art" src="/assets/sbhc-security-cover.png" width="960" height="1200" alt="A figure standing above a monochrome city divided by a vertical red signal">
      </div>
      <header class="site-header">
        <a href="/" aria-label="SBHC Security home">SBHC<span class="signal-mark">SECURITY</span></a>
        <a href="/orbitaldeck/">Current Projects</a>
      </header>
      <div class="hero-copy">
        <p class="eyebrow">Independent signal / Los Angeles</p>
        <h1 id="site-title">SBHC Security</h1>
        <p class="intro">Independent software, and security projects built at the edge of sound, hardware, and art.</p>
      </div>
      <footer class="cover-footer">
        <span>SBHC Security</span>
        <span>Static / no tracking</span>
      </footer>
    </section>
  </main>
</body>
</html>
